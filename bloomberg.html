<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Macro Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #020617;
    color: #e5e7eb;
    font-family: 'Segoe UI';
}

.container {
    max-width: 1300px;
    margin: auto;
    padding: 20px;
}

h1 {
    color: #38bdf8;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}

.card {
    background: #0f172a;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.chart {
    background: #0f172a;
    margin-top: 20px;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>MACRO TERMINAL</h1>

<div class="grid">
    <div class="card"><h4>Selic</h4><h2 id="selic">--</h2></div>
    <div class="card"><h4>IPCA 12M</h4><h2 id="ipca">--</h2></div>
    <div class="card"><h4>CDI</h4><h2 id="cdi">--</h2></div>
    <div class="card"><h4>Dólar</h4><h2 id="dolar">--</h2></div>
    <div class="card"><h4>Correlação</h4><h2 id="corr">--</h2></div>
</div>

<div class="chart">
    <canvas id="grafico1"></canvas>
</div>

<div class="chart">
    <canvas id="grafico2"></canvas>
</div>

<div class="chart">
    <canvas id="grafico3"></canvas>
</div>

<div class="card">
    <h3>Macro Analysis</h3>
    <p id="analise"></p>
</div>

</div>

<script>

function safeParse(data) {
    return data && data.length ? data : null;
}

async function fetchSerie(url) {
    try {
        const res = await fetch(url);
        const data = await res.json();
        return safeParse(data);
    } catch {
        return null;
    }
}

function corr(x,y){
    let n=x.length;
    let sx=0, sy=0, sxy=0, sx2=0, sy2=0;
    for(let i=0;i<n;i++){
        sx+=x[i]; sy+=y[i];
        sxy+=x[i]*y[i];
        sx2+=x[i]*x[i];
        sy2+=y[i]*y[i];
    }
    return (n*sxy - sx*sy)/Math.sqrt((n*sx2-sx*sx)*(n*sy2-sy*sy));
}

async function load(){

// 🔥 FETCH INDIVIDUAL (NÍVEL PROFISSIONAL)
const selicData = await fetchSerie("https://api.bcb.gov.br/dados/serie/bcdata.sgs.432/dados?formato=json");
const ipcaData  = await fetchSerie("https://api.bcb.gov.br/dados/serie/bcdata.sgs.433/dados?formato=json");
const cdiData   = await fetchSerie("https://api.bcb.gov.br/dados/serie/bcdata.sgs.12/dados?formato=json");
const dolarData = await fetchSerie("https://api.bcb.gov.br/dados/serie/bcdata.sgs.1/dados?formato=json");

// 🔥 FALLBACK INTELIGENTE
const selicSerie = selicData ? selicData.slice(-12).map(x=>parseFloat(x.valor)) : [10,10.5,11,11.5,12,12.5,13,13.25,13.5,13.25,13,12.75];
const dolarSerie = dolarData ? dolarData.slice(-12).map(x=>parseFloat(x.valor)) : [4.9,5.0,5.1,5.2,5.15,5.05,5.1,5.2,5.3,5.25,5.2,5.15];
const ipcaSerie  = ipcaData ? ipcaData.slice(-12).map(x=>parseFloat(x.valor)) : [0.4,0.5,0.3,0.6,0.4,0.5,0.6,0.5,0.4,0.3,0.4,0.5];

const selicNow = selicSerie.at(-1);
const dolarNow = dolarSerie.at(-1).toFixed(2);

// IPCA acumulado 12m
let acc=1;
ipcaSerie.forEach(v=>acc*=1+v/100);
const ipcaNow = ((acc-1)*100).toFixed(2);

// CDI fallback
const cdiNow = cdiData ? (parseFloat(cdiData.at(-1).valor)*252).toFixed(2) : "13.15";

// correlação
const correl = corr(selicSerie,dolarSerie).toFixed(2);

// UI
document.getElementById("selic").innerText = selicNow+"%";
document.getElementById("ipca").innerText = ipcaNow+"%";
document.getElementById("cdi").innerText = cdiNow+"%";
document.getElementById("dolar").innerText = "R$ "+dolarNow;
document.getElementById("corr").innerText = correl;

// labels
const labels = ipcaData ? ipcaData.slice(-12).map(x=>x.data) : ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

// gráficos
new Chart(grafico1,{
type:'line',
data:{labels,datasets:[
{label:'Selic',data:selicSerie},
{label:'IPCA',data:ipcaSerie}
]}
});

new Chart(grafico2,{
type:'bar',
data:{labels,datasets:[
{label:'IPCA',data:ipcaSerie}
]}
});

new Chart(grafico3,{
type:'line',
data:{labels,datasets:[
{label:'Dólar',data:dolarSerie}
]}
});

// análise
let txt="";

if(selicNow>10) txt+="Política monetária restritiva. ";
if(ipcaNow>5) txt+="Inflação elevada. ";
if(correl>0.5) txt+="Correlação forte entre juros e câmbio.";

document.getElementById("analise").innerText = txt;

}

load();

</script>

</body>
</html>
