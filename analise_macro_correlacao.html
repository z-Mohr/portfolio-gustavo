<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Análise Macro com Correlação</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0b1120;
    color: #e5e7eb;
    font-family: Arial;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #38bdf8;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

.card {
    background: #020617;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.chart {
    background: #020617;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Macro Análise com Correlação</h1>

<div class="grid">
    <div class="card">
        <h3>Selic</h3>
        <h2 id="selic">--</h2>
    </div>

    <div class="card">
        <h3>IPCA (12M)</h3>
        <h2 id="ipca">--</h2>
    </div>

    <div class="card">
        <h3>Dólar</h3>
        <h2 id="dolar">--</h2>
    </div>

    <div class="card">
        <h3>Correlação</h3>
        <h2 id="corr">--</h2>
    </div>
</div>

<div class="chart">
    <canvas id="grafico"></canvas>
</div>

<div class="card">
    <h3>Análise Econômica</h3>
    <p id="analise"></p>
</div>

</div>

<script>

function correlacao(x, y) {
    let n = x.length;
    let somaX = 0, somaY = 0, somaXY = 0, somaX2 = 0, somaY2 = 0;

    for (let i = 0; i < n; i++) {
        somaX += x[i];
        somaY += y[i];
        somaXY += x[i] * y[i];
        somaX2 += x[i] ** 2;
        somaY2 += y[i] ** 2;
    }

    return (n * somaXY - somaX * somaY) /
        Math.sqrt((n * somaX2 - somaX**2) * (n * somaY2 - somaY**2));
}

async function carregarDados() {

    const selicRes = await fetch("https://api.bcb.gov.br/dados/serie/bcdata.sgs.432/dados?formato=json");
    const ipcaRes = await fetch("https://api.bcb.gov.br/dados/serie/bcdata.sgs.433/dados?formato=json");
    const dolarRes = await fetch("https://api.bcb.gov.br/dados/serie/bcdata.sgs.1/dados?formato=json");

    const selicData = await selicRes.json();
    const ipcaData = await ipcaRes.json();
    const dolarData = await dolarRes.json();

    const selicAtual = parseFloat(selicData.at(-1).valor);
    const dolarAtual = parseFloat(dolarData.at(-1).valor).toFixed(2);

    // IPCA 12 meses
    const ipca12 = ipcaData.slice(-12).map(d => parseFloat(d.valor));
    let acumulado = 1;
    ipca12.forEach(v => acumulado *= (1 + v/100));
    const ipcaFinal = ((acumulado - 1) * 100).toFixed(2);

    // séries
    const selicSerie = selicData.slice(-12).map(d => parseFloat(d.valor));
    const dolarSerie = dolarData.slice(-12).map(d => parseFloat(d.valor));

    const corr = correlacao(selicSerie, dolarSerie).toFixed(2);

    document.getElementById("selic").innerText = selicAtual + "%";
    document.getElementById("ipca").innerText = ipcaFinal + "%";
    document.getElementById("dolar").innerText = "R$ " + dolarAtual;
    document.getElementById("corr").innerText = corr;

    new Chart(document.getElementById("grafico"), {
        type: 'line',
        data: {
            labels: ipcaData.slice(-12).map(d => d.data),
            datasets: [
                { label: 'Selic', data: selicSerie },
                { label: 'Dólar', data: dolarSerie }
            ]
        }
    });

    let texto = "";

    if (corr > 0.5) {
        texto = "Correlação positiva forte: juros altos associados a valorização do dólar.";
    } else if (corr < -0.5) {
        texto = "Correlação negativa forte: política monetária impactando o câmbio inversamente.";
    } else {
        texto = "Correlação fraca: relação pouco significativa entre juros e câmbio.";
    }

    document.getElementById("analise").innerText = texto;
}

carregarDados();

</script>

</body>
</html>
