<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Econômico</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0b1120;
    color: #e5e7eb;
    font-family: Arial;
    margin: 0;
}

.container {
    max-width: 1200px;
    margin: 30px auto;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #38bdf8;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-bottom: 20px;
}

.card {
    background: #020617;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.chart {
    background: #020617;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Dashboard Econômico - Brasil</h1>

<div class="grid">
    <div class="card">
        <h3>Selic</h3>
        <h2 id="selic">--</h2>
    </div>

    <div class="card">
        <h3>IPCA (12M)</h3>
        <h2 id="ipca">--</h2>
    </div>

    <div class="card">
        <h3>CDI (Anual)</h3>
        <h2 id="cdi">--</h2>
    </div>

    <div class="card">
        <h3>Dólar (PTAX)</h3>
        <h2 id="dolar">--</h2>
    </div>
</div>

<div class="chart">
    <canvas id="graficoPrincipal"></canvas>
</div>

<div class="chart">
    <canvas id="graficoComparativo"></canvas>
</div>

<div class="card">
    <h3>Análise Econômica</h3>
    <p id="analise"></p>
</div>

</div>

<script>

let chart1;
let chart2;

async function carregarDados() {
    try {
        const [selicRes, ipcaRes, cdiRes, dolarRes] = await Promise.all([
            fetch("https://api.bcb.gov.br/dados/serie/bcdata.sgs.432/dados?formato=json"),
            fetch("https://api.bcb.gov.br/dados/serie/bcdata.sgs.433/dados?formato=json"),
            fetch("https://api.bcb.gov.br/dados/serie/bcdata.sgs.12/dados?formato=json"),
            fetch("https://api.bcb.gov.br/dados/serie/bcdata.sgs.1/dados?formato=json")
        ]);

        const selicData = await selicRes.json();
        const ipcaData = await ipcaRes.json();
        const cdiData = await cdiRes.json();
        const dolarData = await dolarRes.json();

        // --- SELIC ---
        const selicAtual = parseFloat(selicData.at(-1).valor);

        // --- IPCA 12 MESES (CORRETO) ---
        const ultimos12 = ipcaData.slice(-12).map(d => parseFloat(d.valor));
        let ipcaAcumulado = 1;
        ultimos12.forEach(v => ipcaAcumulado *= (1 + v/100));
        ipcaAcumulado = ((ipcaAcumulado - 1) * 100).toFixed(2);

        // --- CDI ANUALIZADO ---
        const cdiAtual = (parseFloat(cdiData.at(-1).valor) * 252).toFixed(2);

        // --- DÓLAR ---
        const dolarAtual = parseFloat(dolarData.at(-1).valor).toFixed(2);

        // --- GRÁFICOS ---
        const labels = ipcaData.slice(-12).map(d => d.data);
        const selicSerie = Array(12).fill(selicAtual);
        const ipcaSerie = ultimos12;

        atualizarKPIs(selicAtual, ipcaAcumulado, cdiAtual, dolarAtual);
        criarGraficos(labels, selicSerie, ipcaSerie);
        gerarAnalise(selicAtual, ipcaAcumulado);

    } catch (erro) {
        console.log("Erro API, fallback");

        const labels = ["Jan","Fev","Mar","Abr","Mai","Jun"];

        atualizarKPIs(13.75, 4.5, 13.65, 5.10);
        criarGraficos(labels,
            [13.75,13.75,13.75,13.75,13.75,13.75],
            [0.5,0.6,0.4,0.3,0.5,0.4]
        );
        gerarAnalise(13.75, 4.5);
    }
}

function atualizarKPIs(selic, ipca, cdi, dolar) {
    document.getElementById("selic").innerText = selic + "%";
    document.getElementById("ipca").innerText = ipca + "%";
    document.getElementById("cdi").innerText = cdi + "%";
    document.getElementById("dolar").innerText = "R$ " + dolar;
}

function criarGraficos(labels, selic, ipca) {

    if (chart1) chart1.destroy();
    if (chart2) chart2.destroy();

    chart1 = new Chart(document.getElementById("graficoPrincipal"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: 'Selic (%)', data: selic, borderWidth: 2 },
                { label: 'IPCA mensal (%)', data: ipca, borderWidth: 2 }
            ]
        }
    });

    chart2 = new Chart(document.getElementById("graficoComparativo"), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Selic', data: selic },
                { label: 'IPCA', data: ipca }
            ]
        }
    });
}

function gerarAnalise(selic, ipca) {

    let texto = "";

    if (selic > 10) {
        texto += "Política monetária restritiva com taxa Selic elevada. ";
    }

    if (ipca > 5) {
        texto += "Inflação acima da meta do Banco Central. ";
    }

    texto += "Cenário exige cautela em investimentos e gestão de risco.";

    document.getElementById("analise").innerText = texto;
}

carregarDados();

</script>

</body>
</html>
