<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Econômico</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0b1120;
    color: #e5e7eb;
    font-family: Arial;
    margin: 0;
}

.container {
    max-width: 1200px;
    margin: 30px auto;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #38bdf8;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 20px;
}

.card {
    background: #020617;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.chart {
    background: #020617;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Dashboard Econômico - Brasil</h1>

<div class="grid">
    <div class="card">
        <h3>Selic Atual</h3>
        <h2 id="selic">--</h2>
    </div>

    <div class="card">
        <h3>Inflação Atual</h3>
        <h2 id="ipca">--</h2>
    </div>

    <div class="card">
        <h3>Média Selic</h3>
        <h2 id="media">--</h2>
    </div>
</div>

<div class="chart">
    <canvas id="graficoPrincipal"></canvas>
</div>

<div class="chart">
    <canvas id="graficoComparativo"></canvas>
</div>

<!-- 🔥 ANÁLISE AUTOMÁTICA -->
<div class="card">
    <h3>Análise Econômica</h3>
    <p id="analise"></p>
</div>

</div>

<script>

let chart1;
let chart2;

async function carregarDados() {
    try {
        const selicRes = await fetch("https://api.bcb.gov.br/dados/serie/bcdata.sgs.432/dados?formato=json");
        const ipcaRes = await fetch("https://api.bcb.gov.br/dados/serie/bcdata.sgs.433/dados?formato=json");

        const selicData = await selicRes.json();
        const ipcaData = await ipcaRes.json();

        if (!selicData.length) throw "Erro";

        const selic = selicData.slice(-24);
        const ipca = ipcaData.slice(-24);

        const labels = selic.map(d => d.data);
        const valoresSelic = selic.map(d => parseFloat(d.valor));
        const valoresIpca = ipca.map(d => parseFloat(d.valor));

        atualizarKPIs(valoresSelic, valoresIpca);
        criarGraficos(labels, valoresSelic, valoresIpca);
        gerarAnalise(valoresSelic, valoresIpca);

    } catch {
        console.log("Fallback ativado");

        const labels = ["Jan","Fev","Mar","Abr","Mai","Jun"];
        const selic = [10.5,10.75,11,11.25,11.5,11.75];
        const ipca = [4.5,4.7,4.9,5.1,5.0,4.8];

        atualizarKPIs(selic, ipca);
        criarGraficos(labels, selic, ipca);
        gerarAnalise(selic, ipca);
    }
}

function atualizarKPIs(selic, ipca) {
    document.getElementById("selic").innerText = selic.at(-1) + "%";
    document.getElementById("ipca").innerText = ipca.at(-1) + "%";

    const media = (selic.reduce((a,b)=>a+b,0)/selic.length).toFixed(2);
    document.getElementById("media").innerText = media + "%";
}

function criarGraficos(labels, selic, ipca) {

    if (chart1) chart1.destroy();
    if (chart2) chart2.destroy();

    chart1 = new Chart(document.getElementById("graficoPrincipal"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: 'Selic (%)', data: selic, borderWidth: 2 },
                { label: 'IPCA (%)', data: ipca, borderWidth: 2 }
            ]
        }
    });

    chart2 = new Chart(document.getElementById("graficoComparativo"), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Selic', data: selic },
                { label: 'IPCA', data: ipca }
            ]
        }
    });
}

function gerarAnalise(selic, ipca) {

    let ultimaSelic = selic.at(-1);
    let ultimaIpca = ipca.at(-1);

    let texto = "";

    if (ultimaSelic > 10) {
        texto += "A taxa Selic elevada indica uma política monetária restritiva. ";
    }

    if (ultimaIpca > 5) {
        texto += "A inflação acima da meta sugere pressão inflacionária persistente. ";
    }

    texto += "O cenário atual exige atenção na alocação de ativos e gestão de risco.";

    document.getElementById("analise").innerText = texto;
}

carregarDados();

</script>

</body>
</html>
